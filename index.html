<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JERRY MiniApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">JERRY Bayi Paneli</p>
        <h1>MiniApp</h1>
        <p id="status">Telegram oturumu kontrol ediliyor...</p>
      </div>
      <button id="refreshBtn">Yenile</button>
    </section>

    <section class="card profile" id="profileCard"></section>

    <nav class="tabs">
      <button class="tab active" data-tab="catalog">Ürünler</button>
      <button class="tab" data-tab="keys">Keylerim</button>
      <button class="tab" data-tab="tx">Geçmiş</button>
    </nav>

    <section class="content" id="content"></section>
  </main>
 <script src="app.js"></script>
</body>
</html>
